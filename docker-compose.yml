services:
  # ───────────────────────── PostgreSQL ─────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dail
      POSTGRES_USER: dail_user
      POSTGRES_PASSWORD: dail_secret_changeme
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dail_user -d dail"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ───────────────────────── FastAPI App ────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dail_user:dail_secret_changeme@db:5432/dail
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app     # live reload in development
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload

  # ───────────────────────── Alembic migration runner ──────────
  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dail_user:dail_secret_changeme@db:5432/dail
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    profiles:
      - migrate

volumes:
  pgdata:
